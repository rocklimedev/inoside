name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - "backend_dbms/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: rocklimedev
          password: ${{ secrets.INVENTORY_GHCR_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build --no-cache \
            -t ghcr.io/rocklimedev/inoside-backend_dbms:latest \
            ./backend_dbms
          docker push ghcr.io/rocklimedev/inoside-backend_dbms:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 66.116.204.81
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /root/inventory_inoside_backend

            # Login to GHCR
            echo "${{ secrets.INVENTORY_GHCR_TOKEN }}" | docker login ghcr.io \
              -u rocklimedev --password-stdin

            # Pull latest image and redeploy
            docker compose pull backend
            docker compose up -d backend --force-recreate --remove-orphans --pull always

            # Clean up dangling images
            docker image prune -f
